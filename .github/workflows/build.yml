name: Build Android Debug APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Create local.properties
        run: |
          echo "LASTFM_API_KEY=bcf8ddd0b99548f6341335b41c994671" >> local.properties
          echo "LASTFM_SECRET=98fa12c775733f44432336150efd46a4" >> local.properties
          echo "TOGETHER_BEARER_TOKEN=" >> local.properties

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Configure Gradle for CI
        run: |
          echo "org.gradle.jvmargs=-Xmx2048M -Dfile.encoding=UTF-8 -Djava.awt.headless=true -XX:+UseParallelGC" >> gradle.properties
          echo "kotlin.daemon.jvmargs=-Xmx3072M -Djava.awt.headless=true" >> gradle.properties
          echo "kotlin.compiler.execution.strategy=daemon" >> gradle.properties
          echo "org.gradle.parallel=true" >> gradle.properties
          echo "org.gradle.workers.max=2" >> gradle.properties

      - name: Build APKs (Debug & Release)
        run: ./gradlew assembleDebug assembleRelease

      - name: Upload APKs Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Melo-APKs
          path: app/build/outputs/apk/**/*.apk
